apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: frontend-team
  namespace: argocd

spec:
  description: Project for frontend team apps

  # ✅ Allowed Git repositories
  sourceRepos:
    - https://github.com/your-username/argocd-demos.git

  # ✅ Where apps can be deployed
  destinations:
    - namespace: frontend
      server: https://kubernetes.default.svc   # ✅ default cluster

  # ⚠️ Cluster-level resources (keep minimal in prod)
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  # ✅ Namespace-level resources (recommended)
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret

  # ✅ RBAC roles
  roles:
    - name: frontend-admins
      description: Admins for frontend team
      policies:
        - p, proj:frontend-team:frontend-admins, applications, *, frontend-team/*, allow
      groups:
        - frontend-admins-github-team
